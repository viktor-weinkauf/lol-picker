name: Scrape lolalytics data

on:
  schedule:
    # Mondays at 02:00 UTC = 04:00 CEST (03:00 CET in winter — GitHub cron has no DST)
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      tiers:
        description: "Comma-separated tiers (e.g. all,gold_plus,master_plus,emerald_plus)"
        default: "all,gold_plus,master_plus,emerald_plus"
        required: false
      patch:
        description: "Patch window (days)"
        default: "30"
        required: false
      workers:
        description: "Concurrent workers per tier"
        default: "4"
        required: false
      delay:
        description: "Per-worker delay between requests (seconds)"
        default: "0.5"
        required: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrape_data.py \
            --tiers "${{ github.event.inputs.tiers || 'all,gold_plus,master_plus,emerald_plus' }}" \
            --patch "${{ github.event.inputs.patch || '30' }}" \
            --workers "${{ github.event.inputs.workers || '4' }}" \
            --delay "${{ github.event.inputs.delay || '0.5' }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): weekly scrape $(date -u +%Y-%m-%d)"
            git push
          fi
